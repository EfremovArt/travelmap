<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bell Simple</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            padding: 2rem;
        }
        
        #notificationsDropdown {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
            padding: 0.5rem 0.75rem;
            color: #fff;
            background: #333;
            text-decoration: none;
            cursor: pointer;
            border-radius: 0.25rem;
        }
        
        #notificationsDropdown:hover {
            background-color: #555;
        }
        
        #notificationBadge {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            font-size: 0.65rem;
            padding: 0.25em 0.5em;
            pointer-events: none;
        }
        
        #notificationsMenu {
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            border-radius: 0.375rem;
            margin-top: 0.5rem;
        }
        
        #notificationsMenu.show {
            display: block !important;
        }
        
        #notificationsMenu .dropdown-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        
        #notificationsMenu .dropdown-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <h1>Тест колокольчика уведомлений</h1>
    <p>Нажмите на колокольчик ниже:</p>
    
    <div class="position-relative me-3" style="display: inline-block;">
        <a class="nav-link d-flex align-items-center justify-content-center" 
           href="#" 
           id="notificationsDropdown" 
           role="button"
           aria-expanded="false"
           style="min-width: 44px; min-height: 44px; color: #fff;">
            <i class="bi bi-bell fs-5"></i>
            <span id="notificationBadge" class="badge rounded-pill bg-danger position-absolute" style="top: 8px; right: 8px; pointer-events: none;">
                3
            </span>
        </a>
        <div class="dropdown-menu dropdown-menu-end" id="notificationsMenu" style="min-width: 320px; max-width: 400px; display: none; position: absolute; right: 0; top: 100%; z-index: 1050;">
            <div class="dropdown-header d-flex justify-content-between align-items-center">
                <span>Уведомления</span>
                <span id="totalNotifications" class="badge bg-primary">3</span>
            </div>
            <hr class="dropdown-divider">
            <div id="notificationsList">
                <a class="dropdown-item d-flex justify-content-between align-items-center" href="#">
                    <span>
                        <i class="bi bi-image text-warning"></i>
                        Новые фото на модерации
                    </span>
                    <span class="badge bg-warning text-dark">2</span>
                </a>
                <a class="dropdown-item d-flex justify-content-between align-items-center" href="#">
                    <span>
                        <i class="bi bi-chat-dots text-danger"></i>
                        Новые комментарии
                    </span>
                    <span class="badge bg-danger">1</span>
                </a>
            </div>
        </div>
    </div>
    
    <div class="mt-4">
        <h3>Лог событий:</h3>
        <div id="log" style="background: #f8f9fa; padding: 1rem; border-radius: 0.25rem; font-family: monospace; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div>[${time}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        
        addLog('Страница загружена');
        
        // Custom notifications dropdown toggle
        const notificationsDropdown = document.getElementById('notificationsDropdown');
        const notificationsMenu = document.getElementById('notificationsMenu');
        
        addLog('notificationsDropdown: ' + (notificationsDropdown ? 'найден' : 'НЕ найден'));
        addLog('notificationsMenu: ' + (notificationsMenu ? 'найден' : 'НЕ найден'));
        
        if (notificationsDropdown && notificationsMenu) {
            addLog('Инициализация обработчиков...');
            
            // Toggle dropdown on click/tap
            notificationsDropdown.addEventListener('click', function(e) {
                addLog('Клик по колокольчику!');
                e.preventDefault();
                e.stopPropagation();
                
                const isShown = notificationsMenu.classList.contains('show');
                addLog('Текущее состояние: ' + (isShown ? 'открыто' : 'закрыто'));
                
                if (isShown) {
                    notificationsMenu.classList.remove('show');
                    notificationsDropdown.setAttribute('aria-expanded', 'false');
                    addLog('Закрываем dropdown');
                } else {
                    notificationsMenu.classList.add('show');
                    notificationsDropdown.setAttribute('aria-expanded', 'true');
                    addLog('Открываем dropdown');
                }
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                if (!notificationsDropdown.contains(e.target) && !notificationsMenu.contains(e.target)) {
                    if (notificationsMenu.classList.contains('show')) {
                        notificationsMenu.classList.remove('show');
                        notificationsDropdown.setAttribute('aria-expanded', 'false');
                        addLog('Закрыто кликом вне dropdown');
                    }
                }
            });
            
            // Prevent dropdown from closing when clicking inside
            notificationsMenu.addEventListener('click', function(e) {
                e.stopPropagation();
                addLog('Клик внутри dropdown (не закрываем)');
            });
            
            addLog('Обработчики успешно установлены!');
        } else {
            addLog('ОШИБКА: Элементы не найдены!');
        }
    </script>
</body>
</html>
